<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Flip Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #d4e9ff, #b5d8f7);
            font-family: 'Georgia', 'Times New Roman', serif;
            gap: 15px;
            padding: 20px;
            transition: background 0.5s ease;
        }
        
        .greeting-banner {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 12px 20px;
            background: rgba(44, 62, 107, 0.08);
            border-radius: 16px;
            color: #1a2a4a;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid rgba(44, 62, 107, 0.06);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .greeting-banner span { font-weight: 700; opacity: 0.9; }
        .greeting-banner .time-display { opacity: 0.6; font-weight: 400; font-size: 14px; }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 0 10px;
            gap: 10px;
        }
        
        .top-bar-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 50px;
            background: rgba(44, 62, 107, 0.12);
            color: #2c3e6b;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid rgba(44, 62, 107, 0.08);
        }
        .top-bar-btn:hover {
            background: rgba(44, 62, 107, 0.2);
            transform: scale(1.05);
        }

        .clock {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            padding: 40px 50px;
            border-radius: 32px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .clock.fullscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            padding: 40px;
            gap: 30px;
            background: rgba(255,255,255,0.15);
            border: none;
            box-shadow: none;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .clock.fullscreen .flip-unit {
            width: 120px;
            height: 150px;
        }
        .clock.fullscreen .flip-unit .top,
        .clock.fullscreen .flip-unit .bottom,
        .clock.fullscreen .flip-unit .flip-top,
        .clock.fullscreen .flip-unit .flip-bottom {
            font-size: 78px;
        }
        .clock.fullscreen .separator {
            font-size: 48px;
        }
        .clock.fullscreen .label {
            font-size: 16px;
            margin-top: 20px;
        }
        .clock.fullscreen .am-pm {
            font-size: 36px;
        }
        .clock.fullscreen .mode-indicator {
            font-size: 18px;
            padding: 10px 30px;
            top: -30px;
        }

        .flip-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .flip-card .label {
            color: rgba(50,70,100,0.5);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 14px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .flip-unit {
            position: relative;
            width: 80px;
            height: 100px;
            perspective: 300px;
        }
        .flip-unit .top,
        .flip-unit .bottom,
        .flip-unit .flip-top,
        .flip-unit .flip-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 52px;
            font-weight: 700;
            color: #2c3e6b;
            border-radius: 12px;
            backface-visibility: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .flip-unit .top,
        .flip-unit .flip-top {
            top: 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            align-items: flex-end;
            border-radius: 12px 12px 0 0;
        }
        .flip-unit .bottom,
        .flip-unit .flip-bottom {
            bottom: 0;
            align-items: flex-start;
            border-radius: 0 0 12px 12px;
        }
        .flip-unit .top::after,
        .flip-unit .flip-top::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(0,0,0,0.06);
        }
        .flip-unit .flip-top {
            transform-origin: bottom center;
            z-index: 2;
            animation: flipTop 0.5s ease-in forwards;
        }
        .flip-unit .flip-bottom {
            transform-origin: top center;
            z-index: 2;
            animation: flipBottom 0.5s ease-out forwards;
            animation-delay: 0.25s;
        }
        @keyframes flipTop {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }
        @keyframes flipBottom {
            0% { transform: rotateX(90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
        .separator {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            font-size: 32px;
            color: rgba(44,62,107,0.2);
            font-weight: 300;
            padding: 0 4px;
            transition: color 0.3s;
        }
        .mode-indicator {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #2c3e6b;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            transition: color 0.3s;
        }
        .am-pm {
            font-size: 24px;
            color: #2c3e6b;
            opacity: 0.4;
            display: none;
            align-items: center;
            padding-left: 10px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            color: #2c3e6b;
            border: 1px solid rgba(255,255,255,0.3);
            user-select: none;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.95);
        }
        .btn:active { transform: scale(0.95); }
        .btn.active {
            background: rgba(200,200,200,0.7);
            border-color: rgba(100,100,100,0.3);
        }
        
        /* ALL MODE BUTTONS - WHITE by default */
        .btn-secondary { 
            background: rgba(255,255,255,0.85); 
            color: #2c3e6b; 
        }
        .btn-secondary.active { 
            background: rgba(200,200,200,0.7); 
        }
        
        .btn-purple { 
            background: rgba(255,255,255,0.85); 
            color: #2c3e6b; 
        }
        .btn-purple.active { 
            background: rgba(200,200,200,0.7); 
        }
        
        .btn-time { 
            background: rgba(255,255,255,0.85); 
            color: #2c3e6b; 
            border-color: rgba(255,255,255,0.3);
        }
        .btn-time:hover { 
            background: rgba(240,240,240,0.9); 
        }
        .btn-time.active { 
            background: rgba(200,200,200,0.7); 
        }
        
        /* Special buttons (Start/Stop/Reset/Lap) keep their colors */
        .btn-danger { background: rgba(200,70,70,0.8); color: white; border-color: rgba(200,70,70,0.8); }
        .btn-danger.active { background: rgba(150,50,50,0.8); }
        .btn-success { background: rgba(70,180,120,0.8); color: white; border-color: rgba(70,180,120,0.8); }
        .btn-success.active { background: rgba(50,140,90,0.8); }
        .btn-warning { background: rgba(255,180,50,0.8); color: white; border-color: rgba(255,180,50,0.8); }
        .btn-warning.active { background: rgba(200,140,40,0.8); }
        
        .laps-container {
            max-height: 150px;
            overflow-y: auto;
            width: 300px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            display: none;
        }
        .laps-container.show { display: block; }
        .laps-container::-webkit-scrollbar { width: 4px; }
        .laps-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .laps-container::-webkit-scrollbar-thumb { background: rgba(44,62,107,0.3); border-radius: 10px; }
        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #2c3e6b;
            font-size: 13px;
        }
        .lap-item:last-child { border-bottom: none; }
        .lap-number { font-weight: 600; opacity: 0.6; }
        .lap-time { font-weight: 600; }
        .no-laps { color: rgba(44,62,107,0.3); text-align: center; padding: 10px 0; font-style: italic; }
        
        .customization-panel {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            max-width: 800px;
            transition: all 0.3s ease;
            overflow: hidden;
            max-height: 500px;
        }
        .customization-panel.hidden {
            max-height: 0;
            padding: 0 25px;
            border: none;
            margin: 0;
            opacity: 0;
        }
        .custom-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .custom-group label {
            font-size: 11px;
            color: #2c3e6b;
            font-weight: 600;
            font-family: 'Georgia', serif;
        }
        .custom-group input[type="color"] {
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 2px;
            transition: transform 0.2s;
        }
        .custom-group input[type="color"]:hover { transform: scale(1.1); }
        .custom-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .custom-group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        .custom-group select {
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.5);
            font-size: 12px;
            color: #2c3e6b;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: background 0.3s;
        }
        .custom-group select:hover { background: rgba(255,255,255,0.8); }
        .preset-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Georgia', serif;
            color: white;
            transition: transform 0.2s;
        }
        .preset-btn:hover { transform: scale(1.05); }
        .preset-babyblue { background: #7fb9d9; }
        .preset-dark { background: #2d2d44; }
        .preset-pink { background: #d47b8a; }
        .preset-neon { background: #3a8a3a; }
        .preset-sunset { background: #d48a5a; }
        .preset-white { background: #8a8a8a; }
        .reset-custom-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 50px;
            background: rgba(200,70,70,0.7);
            color: white;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .reset-custom-btn:hover { background: rgba(200,70,70,1); transform: scale(1.05); }
        .fullscreen-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 50px;
            background: rgba(100,150,200,0.7);
            color: white;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(100,150,200,1); transform: scale(1.05); }
        
        .exit-fullscreen-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: rgba(200,70,70,0.85);
            color: white;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .exit-fullscreen-btn:hover { 
            background: rgba(200,70,70,1); 
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
        }
        .exit-fullscreen-btn.show { display: block; }

        /* ─── FULLSCREEN MODE - HIDE EVERYTHING EXCEPT CLOCK ─── */
        .fullscreen-mode .greeting-banner,
        .fullscreen-mode .top-bar,
        .fullscreen-mode .customization-panel,
        .fullscreen-mode .controls,
        .fullscreen-mode .laps-container {
            display: none !important;
        }
        .fullscreen-mode .clock {
            margin: 0;
        }

        /* ─── QUOTE DISPLAY ─── */
        .quote-display {
            text-align: center;
            font-size: 18px;
            color: #2c3e6b;
            font-style: italic;
            opacity: 0.7;
            max-width: 500px;
            padding: 10px 20px;
            min-height: 50px;
            transition: all 0.5s ease;
            font-family: 'Georgia', serif;
        }
        .quote-display.pomodoro-quote {
            opacity: 0.9;
            color: #2c3e6b;
            font-weight: 500;
        }
        .clock.fullscreen .quote-display {
            font-size: 22px;
            max-width: 700px;
            color: #1a2a4a;
            opacity: 0.8;
        }

        @media (max-width: 700px) {
            .clock { padding: 20px 16px; gap: 8px; }
            .flip-unit { width: 50px; height: 68px; }
            .flip-unit .top, .flip-unit .bottom, .flip-unit .flip-top, .flip-unit .flip-bottom { font-size: 30px; }
            .separator { font-size: 18px; }
            .btn { padding: 8px 14px; font-size: 11px; }
            .mode-indicator { font-size: 9px; padding: 4px 12px; top: -14px; }
            .greeting-banner { font-size: 13px; padding: 10px 15px; }
            .top-bar-btn { font-size: 11px; padding: 6px 14px; }
            .clock.fullscreen .flip-unit { width: 70px; height: 90px; }
            .clock.fullscreen .flip-unit .top,
            .clock.fullscreen .flip-unit .bottom,
            .clock.fullscreen .flip-unit .flip-top,
            .clock.fullscreen .flip-unit .flip-bottom { font-size: 45px; }
            .clock.fullscreen .separator { font-size: 28px; }
            .clock.fullscreen .am-pm { font-size: 24px; }
            .exit-fullscreen-btn { padding: 8px 16px; font-size: 12px; top: 10px; right: 10px; }
            .quote-display { font-size: 14px; }
            .clock.fullscreen .quote-display { font-size: 16px; }
        }
        @media (max-width: 450px) {
            .flip-unit { width: 40px; height: 55px; }
            .flip-unit .top, .flip-unit .bottom, .flip-unit .flip-top, .flip-unit .flip-bottom { font-size: 24px; }
            .separator { font-size: 14px; }
            .clock { padding: 14px 10px; gap: 4px; }
            .clock.fullscreen .flip-unit { width: 55px; height: 70px; }
            .clock.fullscreen .flip-unit .top,
            .clock.fullscreen .flip-unit .bottom,
            .clock.fullscreen .flip-unit .flip-top,
            .clock.fullscreen .flip-unit .flip-bottom { font-size: 35px; }
            .clock.fullscreen .separator { font-size: 22px; }
            .exit-fullscreen-btn { padding: 6px 12px; font-size: 10px; top: 8px; right: 8px; }
        }
    </style>
</head>
<body>

<!-- ─── GREETING BANNER ─── -->
<div class="greeting-banner" id="greetingBanner">
    👋 Welcome! <span id="greetingMessage">Enjoy your Flip Clock</span>
    <span class="time-display" id="timeDisplay"></span>
</div>

<!-- ─── TOP BAR ─── -->
<div class="top-bar">
    <button class="top-bar-btn" id="fullscreenBtn">⛶ Full Screen</button>
</div>

<!-- ─── EXIT FULLSCREEN BUTTON ─── -->
<button class="exit-fullscreen-btn" id="exitFullscreenBtn">✕ Exit Full Screen</button>

<!-- ─── CLOCK ─── -->
<div class="clock" id="clock">
    <div class="mode-indicator" id="modeIndicator">⏰ Flip Clock</div>
    <div class="flip-card"><div class="flip-unit" id="hours"><div class="top">00</div><div class="bottom">00</div></div><span class="label" id="hoursLabel">Hours</span></div>
    <div class="separator">:</div>
    <div class="flip-card"><div class="flip-unit" id="minutes"><div class="top">00</div><div class="bottom">00</div></div><span class="label" id="minutesLabel">Minutes</span></div>
    <div class="separator">:</div>
    <div class="flip-card"><div class="flip-unit" id="seconds"><div class="top">00</div><div class="bottom">00</div></div><span class="label" id="secondsLabel">Seconds</span></div>
    <div class="flip-card" id="millisecondsCard" style="display:none;"><div class="flip-unit" id="milliseconds" style="width:60px;"><div class="top">00</div><div class="bottom">00</div></div><span class="label">MS</span></div>
    <div class="am-pm" id="amPmDisplay">AM</div>
</div>

<!-- ─── QUOTE DISPLAY ─── -->
<div class="quote-display" id="quoteDisplay">✨ Focus on the present moment</div>

<!-- ─── CUSTOMIZATION PANEL ─── -->
<div class="customization-panel" id="customPanel">
    <div class="custom-group"><label>🎨 BG</label><input type="color" id="bgColor" value="#d4e9ff"></div>
    <div class="custom-group"><label>📦 Face</label><input type="color" id="clockFaceColor" value="#ffffff"></div>
    <div class="custom-group"><label>🔢 Numbers</label><input type="color" id="numberColor" value="#2c3e6b"></div>
    <div class="custom-group"><label>✍️ Font</label>
        <select id="fontSelector">
            <option value="Georgia, 'Times New Roman', serif">Serif</option>
            <option value="'Brush Script MT', cursive">Cursive</option>
            <option value="'Arial Black', sans-serif">Bold</option>
            <option value="'Courier New', monospace">Monospace</option>
            <option value="'Comic Sans MS', cursive">Playful</option>
            <option value="'Palatino', serif">Elegant</option>
            <option value="'Trebuchet MS', sans-serif">Modern</option>
            <option value="'Impact', sans-serif">Impact</option>
        </select>
    </div>
    <div class="custom-group">
        <label>🎨 Presets</label>
        <button class="preset-btn preset-babyblue" data-preset="babyblue">Baby Blue</button>
        <button class="preset-btn preset-dark" data-preset="dark">Dark</button>
        <button class="preset-btn preset-pink" data-preset="pink">Pink</button>
        <button class="preset-btn preset-neon" data-preset="neon">Neon</button>
        <button class="preset-btn preset-sunset" data-preset="sunset">Sunset</button>
        <button class="preset-btn preset-white" data-preset="white">White</button>
    </div>
    <div class="custom-group">
        <button class="reset-custom-btn" id="resetCustomBtn">↺ Reset</button>
        <button class="btn btn-time" id="toggle12hrBtn">🕐 12hr</button>
    </div>
</div>

<!-- ─── CONTROLS ─── -->
<div class="controls">
    <button class="btn btn-secondary" id="toggleModeBtn">⏱️ Stopwatch</button>
    <button class="btn btn-time active" id="timeFormatBtn">🕐 24hr</button>
    <button class="btn btn-purple" id="pomodoroBtn">🍅 Pomodoro</button>
    <button class="btn btn-success" id="startStopBtn" style="display:none;">▶️ Start</button>
    <button class="btn btn-danger" id="resetBtn" style="display:none;">↺ Reset</button>
    <button class="btn btn-secondary" id="lapBtn" style="display:none;">⏱️ Lap</button>
    <button class="btn btn-warning" id="pomodoroStartBtn" style="display:none;">▶️ Start</button>
</div>

<!-- ─── LAPS ─── -->
<div class="laps-container" id="lapsContainer"><div class="no-laps">No laps recorded</div></div>

<script>
// ─── ALL JAVASCRIPT - COMPLETE AND WORKING ───
document.addEventListener('DOMContentLoaded', function() {
    // DOM REFS
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const millisecondsEl = document.getElementById('milliseconds');
    const millisecondsCard = document.getElementById('millisecondsCard');
    const modeIndicator = document.getElementById('modeIndicator');
    const toggleModeBtn = document.getElementById('toggleModeBtn');
    const startStopBtn = document.getElementById('startStopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapBtn = document.getElementById('lapBtn');
    const lapsContainer = document.getElementById('lapsContainer');
    const body = document.body;
    const fontSelector = document.getElementById('fontSelector');
    const resetCustomBtn = document.getElementById('resetCustomBtn');
    const toggle12hrBtn = document.getElementById('toggle12hrBtn');
    const timeFormatBtn = document.getElementById('timeFormatBtn');
    const amPmDisplay = document.getElementById('amPmDisplay');
    const pomodoroBtn = document.getElementById('pomodoroBtn');
    const pomodoroStartBtn = document.getElementById('pomodoroStartBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const exitFullscreenBtn = document.getElementById('exitFullscreenBtn');
    const customPanel = document.getElementById('customPanel');
    const clock = document.getElementById('clock');
    const presetBtns = document.querySelectorAll('.preset-btn');
    const bgColor = document.getElementById('bgColor');
    const clockFaceColor = document.getElementById('clockFaceColor');
    const numberColor = document.getElementById('numberColor');
    const greetingMessage = document.getElementById('greetingMessage');
    const timeDisplay = document.getElementById('timeDisplay');
    const quoteDisplay = document.getElementById('quoteDisplay');

    // ─── ENCOURAGING QUOTES ───
    const quotes = [
        "✨ Focus on the present moment",
        "💪 You're doing great! Keep going!",
        "🌟 Small steps lead to big results",
        "🧘 Stay calm and stay focused",
        "🔥 You've got this! Keep pushing!",
        "🌱 Growth happens outside your comfort zone",
        "⭐ Every minute counts - make it matter",
        "🌈 Believe in yourself and your abilities",
        "🏆 Success is built on consistency",
        "💎 You're capable of amazing things",
        "🌊 Ride the wave of productivity",
        "🎯 Stay focused on what matters most",
        "✨ Your future self will thank you",
        "💡 Great things take time and effort",
        "🌟 You are stronger than you think"
    ];

    let quoteInterval = null;
    let currentQuoteIndex = 0;

    function showNextQuote() {
        currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
        quoteDisplay.textContent = quotes[currentQuoteIndex];
        quoteDisplay.classList.add('pomodoro-quote');
    }

    function startQuoteRotation() {
        if (quoteInterval) clearInterval(quoteInterval);
        // Show first quote immediately
        currentQuoteIndex = Math.floor(Math.random() * quotes.length);
        quoteDisplay.textContent = quotes[currentQuoteIndex];
        quoteDisplay.classList.add('pomodoro-quote');
        // Change quote every 10 seconds
        quoteInterval = setInterval(showNextQuote, 10000);
    }

    function stopQuoteRotation() {
        if (quoteInterval) {
            clearInterval(quoteInterval);
            quoteInterval = null;
        }
        quoteDisplay.textContent = '✨ Focus on the present moment';
        quoteDisplay.classList.remove('pomodoro-quote');
    }

    // ─── STATE ───
    let isStopwatchMode = false;
    let isRunning = false;
    let stopwatchTime = 0;
    let timerInterval = null;
    let laps = [];
    let is12Hour = false;
    let isPomodoroMode = false;
    let pomodoroRemaining = 25 * 60 * 1000;
    let pomodoroRunning = false;
    let pomodoroInterval = null;
    let isBreak = false;
    let clockInterval = null;
    let isFullscreen = false;

    const defaultColors = { bg: '#d4e9ff', face: '#ffffff', number: '#2c3e6b' };
    const presets = {
        babyblue: { bg: '#d4e9ff', face: '#ffffff', number: '#2c3e6b' },
        dark: { bg: '#1a1a2e', face: '#2d2d44', number: '#e0e0ff' },
        pink: { bg: '#ffe4ec', face: '#fff0f5', number: '#8b4a6b' },
        neon: { bg: '#1a2a1a', face: '#2a3a2a', number: '#7fff7f' },
        sunset: { bg: '#ffe4c4', face: '#fff8f0', number: '#8b5a3a' },
        white: { bg: '#f5f5f5', face: '#ffffff', number: '#333333' }
    };

    // ─── GREETING UPDATE ───
    function updateGreeting() {
        const now = new Date();
        const hour = now.getHours();
        let greet = '';
        if (hour < 12) greet = 'Good Morning! ☀️';
        else if (hour < 17) greet = 'Good Afternoon! 🌤️';
        else if (hour < 21) greet = 'Good Evening! 🌆';
        else greet = 'Good Night! 🌙';
        greetingMessage.textContent = greet;
        timeDisplay.textContent = '🕐 ' + now.toLocaleTimeString();
    }
    updateGreeting();
    setInterval(updateGreeting, 30000);

    // ─── HELPERS ───
    function pad(n) { return String(n).padStart(2, '0'); }

    function adjustColor(hex, percent) {
        try {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            r = Math.min(255, Math.max(0, r + percent));
            g = Math.min(255, Math.max(0, g + percent));
            b = Math.min(255, Math.max(0, b + percent));
            return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
        } catch(e) { return hex; }
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        const millis = Math.floor((ms % 1000) / 10);
        return { hours, minutes, seconds, millis };
    }

    function updateFlip(container, newValue) {
        const top = container.querySelector('.top');
        const bottom = container.querySelector('.bottom');
        if (top.textContent === newValue) return;
        container.querySelectorAll('.flip-top, .flip-bottom').forEach(el => el.remove());
        bottom.textContent = newValue;
        const flipTop = document.createElement('div');
        flipTop.className = 'flip-top';
        flipTop.textContent = top.textContent;
        const flipBottom = document.createElement('div');
        flipBottom.className = 'flip-bottom';
        flipBottom.textContent = newValue;
        container.appendChild(flipTop);
        container.appendChild(flipBottom);
        setTimeout(() => {
            top.textContent = newValue;
            flipTop.remove();
            flipBottom.remove();
        }, 600);
    }

    function updateDisplay(ms) {
        const t = formatTime(ms);
        updateFlip(hoursEl, pad(t.hours));
        updateFlip(minutesEl, pad(t.minutes));
        updateFlip(secondsEl, pad(t.seconds));
        if (isStopwatchMode) {
            updateFlip(millisecondsEl, pad(t.millis));
        }
    }

    function formatLapTime(ms) {
        const t = formatTime(ms);
        return pad(t.hours) + ':' + pad(t.minutes) + ':' + pad(t.seconds) + '.' + pad(t.millis);
    }

    function renderLaps() {
        if (laps.length === 0) {
            lapsContainer.innerHTML = '<div class="no-laps">No laps recorded</div>';
            return;
        }
        lapsContainer.innerHTML = laps.map((lap, i) =>
            '<div class="lap-item"><span class="lap-number">Lap ' + (laps.length - i) + '</span><span class="lap-time">' + formatLapTime(lap) + '</span></div>'
        ).join('');
    }

    // ─── APPLY CUSTOMIZATIONS ───
    function applyCustomizations() {
        const bg = bgColor.value;
        body.style.background = 'linear-gradient(145deg, ' + bg + ', ' + adjustColor(bg, -20) + ')';

        const face = clockFaceColor.value;
        document.querySelectorAll('.top, .bottom, .flip-top, .flip-bottom').forEach(el => {
            el.style.background = 'linear-gradient(180deg, ' + adjustColor(face, 10) + ', ' + face + ')';
        });

        const num = numberColor.value;
        document.querySelectorAll('.top, .bottom, .flip-top, .flip-bottom').forEach(el => {
            el.style.color = num;
        });
        document.querySelectorAll('.label, .separator, .mode-indicator, .am-pm, .greeting-banner, .quote-display').forEach(el => {
            el.style.color = num;
        });
        document.querySelectorAll('.greeting-banner').forEach(el => {
            el.style.color = num;
            el.style.borderColor = num + '20';
        });

        const font = fontSelector.value;
        document.querySelectorAll('.top, .bottom, .flip-top, .flip-bottom, .label, .mode-indicator, .btn, .greeting-banner, .quote-display, .custom-group label, .custom-group select, .reset-custom-btn, .preset-btn, .top-bar-btn, .exit-fullscreen-btn').forEach(el => {
            el.style.fontFamily = font;
        });
    }

    function updateButtonStates(activeBtn) {
        [toggleModeBtn, timeFormatBtn, pomodoroBtn].forEach(btn => btn.classList.remove('active'));
        if (activeBtn) activeBtn.classList.add('active');
    }

    function update12hrButtons() {
        timeFormatBtn.textContent = is12Hour ? '🕐 12hr' : '🕐 24hr';
        toggle12hrBtn.textContent = is12Hour ? '🕐 24hr' : '🕐 12hr';
    }

    function stopAllTimers() {
        if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        if (pomodoroInterval) { clearInterval(pomodoroInterval); pomodoroInterval = null; }
    }

    function hideModeControls() {
        startStopBtn.style.display = 'none';
        resetBtn.style.display = 'none';
        lapBtn.style.display = 'none';
        pomodoroStartBtn.style.display = 'none';
        lapsContainer.classList.remove('show');
        millisecondsCard.style.display = 'none';
        amPmDisplay.style.display = is12Hour && !isStopwatchMode && !isPomodoroMode ? 'flex' : 'none';
    }

    // ─── CLOCK ───
    function startClock() {
        isStopwatchMode = false;
        isPomodoroMode = false;
        isRunning = false;
        pomodoroRunning = false;
        stopQuoteRotation();
        stopAllTimers();
        toggleModeBtn.textContent = '⏱️ Stopwatch';
        pomodoroBtn.textContent = '🍅 Pomodoro';
        hideModeControls();
        updateButtonStates(timeFormatBtn);
        modeIndicator.textContent = '⏰ Flip Clock';
        document.getElementById('hoursLabel').textContent = 'Hours';
        document.getElementById('minutesLabel').textContent = 'Minutes';
        document.getElementById('secondsLabel').textContent = 'Seconds';

        clockInterval = setInterval(() => {
            const now = new Date();
            let hours = now.getHours();
            if (is12Hour) {
                amPmDisplay.textContent = hours >= 12 ? 'PM' : 'AM';
                amPmDisplay.style.display = 'flex';
                hours = hours % 12 || 12;
            } else {
                amPmDisplay.style.display = 'none';
            }
            updateFlip(hoursEl, pad(hours));
            updateFlip(minutesEl, pad(now.getMinutes()));
            updateFlip(secondsEl, pad(now.getSeconds()));
        }, 1000);

        const now = new Date();
        let hours = now.getHours();
        if (is12Hour) {
            amPmDisplay.textContent = hours >= 12 ? 'PM' : 'AM';
            amPmDisplay.style.display = 'flex';
            hours = hours % 12 || 12;
        } else {
            amPmDisplay.style.display = 'none';
        }
        hoursEl.querySelector('.top').textContent = pad(hours);
        hoursEl.querySelector('.bottom').textContent = pad(hours);
        minutesEl.querySelector('.top').textContent = pad(now.getMinutes());
        minutesEl.querySelector('.bottom').textContent = pad(now.getMinutes());
        secondsEl.querySelector('.top').textContent = pad(now.getSeconds());
        secondsEl.querySelector('.bottom').textContent = pad(now.getSeconds());
        update12hrButtons();
    }

    // ─── STOPWATCH ───
    function enterStopwatchMode() {
        isStopwatchMode = true;
        isPomodoroMode = false;
        pomodoroRunning = false;
        stopQuoteRotation();
        stopAllTimers();
        pomodoroBtn.textContent = '🍅 Pomodoro';
        updateButtonStates(toggleModeBtn);
        modeIndicator.textContent = '⏱️ Stopwatch';
        document.getElementById('hoursLabel').textContent = 'Hours';
        document.getElementById('minutesLabel').textContent = 'Minutes';
        document.getElementById('secondsLabel').textContent = 'Seconds';
        millisecondsCard.style.display = 'flex';
        amPmDisplay.style.display = 'none';
        startStopBtn.style.display = 'inline-block';
        resetBtn.style.display = 'inline-block';
        lapBtn.style.display = 'inline-block';
        lapsContainer.classList.add('show');
        toggleModeBtn.textContent = '⏰ Clock';
        updateDisplay(stopwatchTime);
    }

    function startStopwatch() {
        if (isRunning) {
            isRunning = false;
            clearInterval(timerInterval);
            timerInterval = null;
            startStopBtn.textContent = '▶️ Start';
            startStopBtn.classList.remove('active');
            return;
        }
        isRunning = true;
        const startTime = Date.now() - stopwatchTime;
        startStopBtn.textContent = '⏸️ Stop';
        startStopBtn.classList.add('active');
        timerInterval = setInterval(() => {
            stopwatchTime = Date.now() - startTime;
            updateDisplay(stopwatchTime);
        }, 10);
    }

    function resetStopwatch() {
        isRunning = false;
        stopwatchTime = 0;
        laps = [];
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        startStopBtn.textContent = '▶️ Start';
        startStopBtn.classList.remove('active');
        updateDisplay(0);
        renderLaps();
    }

    function recordLap() {
        if (!isRunning) return;
        laps.unshift(stopwatchTime);
        renderLaps();
    }

    // ─── POMODORO ───
    const WORK_TIME = 25 * 60 * 1000;
    const BREAK_TIME = 5 * 60 * 1000;

    function enterPomodoroMode() {
        isStopwatchMode = false;
        isPomodoroMode = true;
        isRunning = false;
        pomodoroRunning = false;
        isBreak = false;
        pomodoroRemaining = WORK_TIME;
        stopAllTimers();
        toggleModeBtn.textContent = '⏱️ Stopwatch';
        updateButtonStates(pomodoroBtn);
        modeIndicator.textContent = '🍅 Pomodoro — Work';
        document.getElementById('hoursLabel').textContent = 'Work';
        document.getElementById('minutesLabel').textContent = 'Minutes';
        document.getElementById('secondsLabel').textContent = 'Seconds';
        millisecondsCard.style.display = 'none';
        amPmDisplay.style.display = 'none';
        hideModeControls();
        pomodoroStartBtn.style.display = 'inline-block';
        pomodoroStartBtn.textContent = '▶️ Start';
        pomodoroBtn.textContent = '⏰ Clock';
        updateDisplay(pomodoroRemaining);
        startQuoteRotation();
    }

    function startPomodoro() {
        if (pomodoroRunning) {
            pomodoroRunning = false;
            clearInterval(pomodoroInterval);
            pomodoroInterval = null;
            pomodoroStartBtn.textContent = '▶️ Start';
            pomodoroStartBtn.classList.remove('active');
            return;
        }
        pomodoroRunning = true;
        const endTime = Date.now() + pomodoroRemaining;
        pomodoroStartBtn.textContent = '⏸️ Pause';
        pomodoroStartBtn.classList.add('active');
        pomodoroInterval = setInterval(() => {
            pomodoroRemaining = Math.max(0, endTime - Date.now());
            updateDisplay(pomodoroRemaining);
            if (pomodoroRemaining <= 0) {
                clearInterval(pomodoroInterval);
                pomodoroInterval = null;
                pomodoroRunning = false;
                pomodoroStartBtn.textContent = '▶️ Start';
                pomodoroStartBtn.classList.remove('active');
                if (isBreak) {
                    isBreak = false;
                    pomodoroRemaining = WORK_TIME;
                    modeIndicator.textContent = '🍅 Pomodoro — Work';
                    document.getElementById('hoursLabel').textContent = 'Work';
                } else {
                    isBreak = true;
                    pomodoroRemaining = BREAK_TIME;
                    modeIndicator.textContent = '☕ Pomodoro — Break';
                    document.getElementById('hoursLabel').textContent = 'Break';
                }
                updateDisplay(pomodoroRemaining);
                try {
                    if (Notification.permission === 'granted') {
                        new Notification(isBreak ? 'Break time!' : 'Back to work!', {
                            body: isBreak ? 'Take a 5-minute break.' : 'Start your next focus session.'
                        });
                    }
                } catch (e) { /* notifications optional */ }
            }
        }, 100);
    }

    // ─── FULLSCREEN ───
    function enterFullscreen() {
        isFullscreen = true;
        body.classList.add('fullscreen-mode');
        clock.classList.add('fullscreen');
        exitFullscreenBtn.classList.add('show');
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }

    function exitFullscreen() {
        isFullscreen = false;
        body.classList.remove('fullscreen-mode');
        clock.classList.remove('fullscreen');
        exitFullscreenBtn.classList.remove('show');
        if (document.fullscreenElement && document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
        }
    }

    function toggleFullscreen() {
        if (isFullscreen) exitFullscreen();
        else enterFullscreen();
    }

    // ─── EVENT LISTENERS ───
    toggleModeBtn.addEventListener('click', () => {
        if (isStopwatchMode) {
            toggleModeBtn.textContent = '⏱️ Stopwatch';
            startClock();
        } else {
            enterStopwatchMode();
        }
    });

    timeFormatBtn.addEventListener('click', () => {
        if (isStopwatchMode || isPomodoroMode) {
            toggleModeBtn.textContent = '⏱️ Stopwatch';
            pomodoroBtn.textContent = '🍅 Pomodoro';
            startClock();
            return;
        }
        is12Hour = !is12Hour;
        update12hrButtons();
        startClock();
    });

    pomodoroBtn.addEventListener('click', () => {
        if (isPomodoroMode) {
            pomodoroBtn.textContent = '🍅 Pomodoro';
            stopQuoteRotation();
            startClock();
        } else {
            enterPomodoroMode();
        }
    });

    startStopBtn.addEventListener('click', startStopwatch);
    resetBtn.addEventListener('click', resetStopwatch);
    lapBtn.addEventListener('click', recordLap);
    pomodoroStartBtn.addEventListener('click', startPomodoro);

    toggle12hrBtn.addEventListener('click', () => {
        is12Hour = !is12Hour;
        update12hrButtons();
        if (!isStopwatchMode && !isPomodoroMode) startClock();
    });

    fullscreenBtn.addEventListener('click', enterFullscreen);
    exitFullscreenBtn.addEventListener('click', exitFullscreen);

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && isFullscreen) exitFullscreen();
    });

    bgColor.addEventListener('input', applyCustomizations);
    clockFaceColor.addEventListener('input', applyCustomizations);
    numberColor.addEventListener('input', applyCustomizations);
    fontSelector.addEventListener('change', applyCustomizations);

    presetBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const preset = presets[btn.dataset.preset];
            if (!preset) return;
            bgColor.value = preset.bg;
            clockFaceColor.value = preset.face;
            numberColor.value = preset.number;
            applyCustomizations();
        });
    });

    resetCustomBtn.addEventListener('click', () => {
        bgColor.value = defaultColors.bg;
        clockFaceColor.value = defaultColors.face;
        numberColor.value = defaultColors.number;
        fontSelector.value = "Georgia, 'Times New Roman', serif";
        applyCustomizations();
    });

    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    // ─── INIT ───
    applyCustomizations();
    update12hrButtons();
    startClock();
});
</script>
</body>
</html>
