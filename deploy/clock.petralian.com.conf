server {
    listen 80;
    server_name clock.petralian.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name clock.petralian.com;
    root /www/wwwroot/clock.petralian.com;
    index index.html;

    ssl_certificate    /www/server/panel/vhost/cert/clock.petralian.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/clock.petralian.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Short settings links (PHP + SQLite) — see deploy/shortlink/
    include /www/server/panel/vhost/nginx/extension/clock.petralian.com/shortlink.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.well-known {
        allow all;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    access_log /www/wwwlogs/clock.petralian.com.log;
    error_log  /www/wwwlogs/clock.petralian.com.error.log;
}
